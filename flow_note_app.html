<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Note App</title>
  
  <!-- This catches errors and prints them to the screen instead of a blank white page -->
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: sans-serif;">' +
        '<h2>Oops! Something went wrong.</h2>' +
        '<p><strong>Error:</strong> ' + message + '</p>' +
        '</div>';
    };
  </script>

  <!-- Tailwind CSS -->
  <script src="tailwindcss.js"></script>
  
  <!-- React & ReactDOM -->
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="babel.min.js"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Removed data-type="module" to allow it to run perfectly offline on file:/// -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- Inline SVGs (Replacing Lucide Icons for offline capability) ---
    const Icons = {
      Diamond: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.7 10.3a2.41 2.41 0 0 0 0 3.41l7.59 7.59a2.41 2.41 0 0 0 3.41 0l7.59-7.59a2.41 2.41 0 0 0 0-3.41l-7.59-7.59a2.41 2.41 0 0 0-3.41 0Z"/></svg>,
      Info: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
      Download: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
      Upload: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      Trash2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
      PlusCircle: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    };

    // --- Initial Sample Data ---
    const initialNodes = [
      { id: '1', x: 200, y: 100, w: 140, h: 60, text: 'cash\navailable', type: 'process' },
      { id: '2', x: 450, y: 50, w: 120, h: 50, text: 'travel', type: 'process' },
      { id: '3', x: 450, y: 150, w: 120, h: 50, text: 'study aboard', type: 'process' },
      { id: '4', x: 450, y: 280, w: 120, h: 60, text: 'making\nbusiness', type: 'process' },
      { id: '5', x: 190, y: 350, w: 160, h: 90, text: 'mercidysb\nenzes', type: 'decision' },
    ];

    const initialEdges = [
      { id: 'e1', source: '1', target: '2' },
      { id: 'e2', source: '1', target: '3' },
      { id: 'e3', source: '1', target: '4' },
      { id: 'e4', source: '1', target: '5' },
      { id: 'e5', source: '5', target: '4', text: 'yes' },
    ];

    // --- Math & Geometry Helpers ---
    function getIntersection(source, target) {
      const cx = target.x + target.w / 2;
      const cy = target.y + target.h / 2;
      const px = source.x + source.w / 2;
      const py = source.y + source.h / 2;
      
      let dx = cx - px;
      let dy = cy - py;
      
      if (dx === 0 && dy === 0) return { x: cx, y: cy };
      
      if (target.type === 'decision') {
        let absDx = Math.abs(dx);
        let absDy = Math.abs(dy);
        let t = 1 / (absDx / (target.w / 2) + absDy / (target.h / 2));
        return { x: cx - t * dx, y: cy - t * dy };
      } else {
        let absDx = Math.abs(dx);
        let absDy = Math.abs(dy);
        let halfW = target.w / 2;
        let halfH = target.h / 2;
        let crossX = halfW;
        let crossY = crossX * absDy / absDx;
        
        if (crossY > halfH) {
            crossY = halfH;
            crossX = crossY * absDx / absDy;
        }
        return {
            x: cx - (dx > 0 ? crossX : -crossX),
            y: cy - (dy > 0 ? crossY : -crossY)
        };
      }
    }

    const generateId = () => Math.random().toString(36).substr(2, 9);

    function FlowNoteApp() {
      const [nodes, setNodes] = useState(initialNodes);
      const [edges, setEdges] = useState(initialEdges);
      const [selectedNodeIds, setSelectedNodeIds] = useState([]);
      const [editingNodeId, setEditingNodeId] = useState(null);
      const [editingEdgeId, setEditingEdgeId] = useState(null);
      
      // Drag, Drop, and Resize State
      const [draggingNodeInfo, setDraggingNodeInfo] = useState(null);
      const [isConnecting, setIsConnecting] = useState(null);
      const [tempMousePos, setTempMousePos] = useState({ x: 0, y: 0 });
      const [isSelectingBox, setIsSelectingBox] = useState(null);
      const [bbResizingInfo, setBbResizingInfo] = useState(null);
      
      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);

      // --- Keyboard Shortcuts ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

          // Deletion
          if (e.key === 'Delete' || e.key === 'Backspace') {
            setNodes((prev) => prev.filter((n) => !selectedNodeIds.includes(n.id)));
            setEdges((prev) => prev.filter((edge) => !selectedNodeIds.includes(edge.source) && !selectedNodeIds.includes(edge.target)));
            setSelectedNodeIds([]);
          }

          // Requirement 2: Hotkey (Shift + Right) to add connected block
          if (e.key === 'ArrowRight' && e.shiftKey && selectedNodeIds.length === 1) {
            e.preventDefault();
            const sourceNode = nodes.find(n => n.id === selectedNodeIds[0]);
            if (sourceNode) {
              const newNode = {
                id: generateId(),
                x: sourceNode.x + sourceNode.w + 60,
                y: sourceNode.y,
                w: 120,
                h: 60,
                text: 'New Step',
                type: 'process'
              };
              const newEdge = {
                id: generateId(),
                source: sourceNode.id,
                target: newNode.id
              };
              setNodes(prev => [...prev, newNode]);
              setEdges(prev => [...prev, newEdge]);
              setSelectedNodeIds([newNode.id]);
              setEditingNodeId(newNode.id);
            }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedNodeIds, nodes]);

      // --- IO Actions ---
      const handleSave = () => {
        const data = JSON.stringify({ nodes, edges }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'flownote.json';
        a.click();
      };

      const handleLoad = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.nodes && data.edges) {
              setNodes(data.nodes);
              setEdges(data.edges);
              setSelectedNodeIds([]);
            }
          } catch (err) {
            console.error("Invalid file format");
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // Reset
      };

      // --- Canvas Interactions ---
      const getCanvasCoords = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      };

      const handleCanvasMouseDown = (e) => {
        if (e.target !== canvasRef.current) return;
        
        // Start multi-selection box
        const coords = getCanvasCoords(e);
        setIsSelectingBox({
          startX: coords.x,
          startY: coords.y,
          currentX: coords.x,
          currentY: coords.y
        });
        setSelectedNodeIds([]);
        setEditingNodeId(null);
        setEditingEdgeId(null);
      };

      const handleMouseMove = (e) => {
        const coords = getCanvasCoords(e);
        setTempMousePos(coords);

        if (draggingNodeInfo) {
          e.preventDefault();
          const dx = coords.x - draggingNodeInfo.startX;
          const dy = coords.y - draggingNodeInfo.startY;
          setNodes(nodes.map(n => {
            if (selectedNodeIds.includes(n.id)) {
              const orig = draggingNodeInfo.originalNodes.find(o => o.id === n.id);
              return { ...n, x: orig.x + dx, y: orig.y + dy };
            }
            return n;
          }));
        } else if (bbResizingInfo) {
          e.preventDefault();
          const dx = coords.x - bbResizingInfo.startX;
          const dy = coords.y - bbResizingInfo.startY;
          
          const newBbW = Math.max(40, bbResizingInfo.startBB.w + dx);
          const newBbH = Math.max(40, bbResizingInfo.startBB.h + dy);
          const scaleX = newBbW / bbResizingInfo.startBB.w;
          const scaleY = newBbH / bbResizingInfo.startBB.h;

          setNodes(nodes.map(n => {
            if (selectedNodeIds.includes(n.id)) {
              const orig = bbResizingInfo.startNodes.find(o => o.id === n.id);
              return {
                ...n,
                x: bbResizingInfo.startBB.x + (orig.x - bbResizingInfo.startBB.x) * scaleX,
                y: bbResizingInfo.startBB.y + (orig.y - bbResizingInfo.startBB.y) * scaleY,
                w: Math.max(20, orig.w * scaleX),
                h: Math.max(20, orig.h * scaleY),
              };
            }
            return n;
          }));
        } else if (isSelectingBox) {
          setIsSelectingBox(prev => ({ ...prev, currentX: coords.x, currentY: coords.y }));
        }
      };

      const handleMouseUp = (e) => {
        if (isConnecting) {
          setIsConnecting(null);
        }
        if (draggingNodeInfo) {
          setDraggingNodeInfo(null);
        }
        if (bbResizingInfo) {
          setBbResizingInfo(null);
        }
        if (isSelectingBox) {
          // Find all nodes inside the selection box
          const minX = Math.min(isSelectingBox.startX, isSelectingBox.currentX);
          const maxX = Math.max(isSelectingBox.startX, isSelectingBox.currentX);
          const minY = Math.min(isSelectingBox.startY, isSelectingBox.currentY);
          const maxY = Math.max(isSelectingBox.startY, isSelectingBox.currentY);
          
          const intersectingNodes = nodes.filter(n => {
            return (n.x < maxX && n.x + n.w > minX && n.y < maxY && n.y + n.h > minY);
          });
          setSelectedNodeIds(intersectingNodes.map(n => n.id));
          setIsSelectingBox(null);
        }
      };

      // --- Drag and Drop from Sidebar ---
      const handleDrop = (e) => {
        e.preventDefault();
        const type = e.dataTransfer.getData('nodeType');
        if (type) {
          const coords = getCanvasCoords(e);
          setNodes(prev => [...prev, {
            id: generateId(),
            x: coords.x - 60,
            y: coords.y - 30,
            w: type === 'decision' ? 140 : 120,
            h: type === 'decision' ? 80 : 60,
            text: type === 'decision' ? 'Decision' : 'Process',
            type
          }]);
        }
      };

      // --- Node Interactions ---
      const handleNodeMouseDown = (e, nodeId) => {
        e.stopPropagation();
        if (editingNodeId === nodeId) return;

        let newSelection = [...selectedNodeIds];
        if (!newSelection.includes(nodeId)) {
          if (e.shiftKey) newSelection.push(nodeId);
          else newSelection = [nodeId];
          setSelectedNodeIds(newSelection);
        } else if (e.shiftKey) {
          newSelection = newSelection.filter(id => id !== nodeId);
          setSelectedNodeIds(newSelection);
          return;
        }
        
        setEditingEdgeId(null);
        setEditingNodeId(null);

        const coords = getCanvasCoords(e);
        setDraggingNodeInfo({
          startX: coords.x,
          startY: coords.y,
          originalNodes: nodes.filter(n => newSelection.includes(n.id))
        });
      };

      const handleConnectionStart = (e, nodeId) => {
        e.stopPropagation();
        setIsConnecting({ sourceId: nodeId });
      };

      const handleNodeMouseUp = (e, targetId) => {
        if (isConnecting && isConnecting.sourceId !== targetId) {
          setEdges(prev => [...prev, {
            id: generateId(),
            source: isConnecting.sourceId,
            target: targetId
          }]);
        }
      };

      const updateNodeText = (id, text) => {
        setNodes(nodes.map(n => n.id === id ? { ...n, text } : n));
      };

      const updateEdgeText = (id, text) => {
        setEdges(edges.map(e => e.id === id ? { ...e, text } : e));
      };

      // --- Multi-selection Bounding Box ---
      const getBoundingBox = () => {
        if (selectedNodeIds.length === 0) return null;
        const selected = nodes.filter(n => selectedNodeIds.includes(n.id));
        const minX = Math.min(...selected.map(n => n.x));
        const minY = Math.min(...selected.map(n => n.y));
        const maxX = Math.max(...selected.map(n => n.x + n.w));
        const maxY = Math.max(...selected.map(n => n.y + n.h));
        return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
      };

      const bb = getBoundingBox();

      return (
        <div className="flex flex-col h-screen bg-slate-100 text-slate-800 font-sans selection:bg-pink-100">
          
          {/* Top Toolbar */}
          <header className="flex items-center justify-between px-6 py-3 bg-white border-b shadow-sm z-10 shrink-0">
            <div className="flex items-center gap-2">
              <Icons.Diamond className="text-pink-600 w-6 h-6" />
              <h1 className="text-xl font-bold text-slate-800 tracking-tight">Flow Note</h1>
            </div>
            
            <div className="flex items-center gap-4">
              <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded border text-xs text-slate-500">
                <Icons.Info className="w-4 h-4" />
                <span>Select & hit <b>Shift + Right Arrow</b> to quick-add blocks!</span>
              </div>

              <div className="h-6 w-px bg-slate-200 mx-2" />
              
              <button onClick={handleSave} className="flex items-center gap-2 text-sm font-medium px-3 py-1.5 hover:bg-slate-100 rounded text-slate-700 transition-colors">
                <Icons.Download className="w-4 h-4" /> Save
              </button>
              
              <label className="flex items-center gap-2 text-sm font-medium px-3 py-1.5 hover:bg-slate-100 rounded text-slate-700 cursor-pointer transition-colors">
                <Icons.Upload className="w-4 h-4" /> Load
                <input type="file" accept=".json" onChange={handleLoad} className="hidden" ref={fileInputRef} />
              </label>
              
              <button 
                onClick={() => {
                  setNodes((prev) => prev.filter((n) => !selectedNodeIds.includes(n.id)));
                  setEdges((prev) => prev.filter((edge) => !selectedNodeIds.includes(edge.source) && !selectedNodeIds.includes(edge.target)));
                  setSelectedNodeIds([]);
                }}
                disabled={selectedNodeIds.length === 0}
                className="flex items-center gap-2 text-sm font-medium px-3 py-1.5 hover:bg-red-50 text-red-600 rounded disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
              >
                <Icons.Trash2 className="w-4 h-4" /> Delete
              </button>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden">
            
            {/* Left Sidebar */}
            <aside className="w-64 bg-white border-r flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10">
              <div className="p-4 border-b bg-slate-50/50">
                <h2 className="text-xs font-bold text-slate-500 uppercase tracking-wider">Shapes Library</h2>
                <p className="text-xs text-slate-400 mt-1">Drag and drop into the drawing area</p>
              </div>
              
              <div className="p-4 flex flex-col gap-4">
                <div 
                  draggable 
                  onDragStart={(e) => e.dataTransfer.setData('nodeType', 'process')}
                  className="flex flex-col items-center gap-2 p-4 border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 hover:bg-pink-50 hover:border-pink-300 cursor-grab active:cursor-grabbing transition-colors"
                >
                  <div className="w-16 h-10 border-2 border-pink-500 bg-white" />
                  <span className="text-xs font-medium text-slate-600">Process Block</span>
                </div>

                <div 
                  draggable 
                  onDragStart={(e) => e.dataTransfer.setData('nodeType', 'decision')}
                  className="flex flex-col items-center gap-2 p-4 border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 hover:bg-pink-50 hover:border-pink-300 cursor-grab active:cursor-grabbing transition-colors"
                >
                  <div className="w-12 h-12 border-2 border-pink-500 bg-white rotate-45 transform origin-center my-2" />
                  <span className="text-xs font-medium text-slate-600">Decision Diamond</span>
                </div>
              </div>
            </aside>

            {/* Main Canvas Area */}
            <main 
              className="flex-1 overflow-auto relative bg-[#F6F7F9]"
              onDragOver={(e) => e.preventDefault()}
              onDrop={handleDrop}
            >
              {/* Infinite-like Canvas Container */}
              <div 
                ref={canvasRef}
                className="w-[3000px] h-[3000px] relative origin-top-left outline-none select-none"
                style={{ 
                  backgroundImage: 'radial-gradient(#D1D5DB 1px, transparent 0)', 
                  backgroundSize: '24px 24px' 
                }}
                onMouseDown={handleCanvasMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
              >
                
                {/* SVG Layer for Edges and Selections */}
                <svg className="absolute inset-0 w-full h-full pointer-events-none z-0">
                  <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                      <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899" />
                    </marker>
                    <marker id="arrowhead-connecting" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
                    </marker>
                  </defs>

                  {/* Render existing edges */}
                  {edges.map(edge => {
                    const sourceNode = nodes.find(n => n.id === edge.source);
                    const targetNode = nodes.find(n => n.id === edge.target);
                    if (!sourceNode || !targetNode) return null;

                    const p1 = getIntersection(targetNode, sourceNode);
                    const p2 = getIntersection(sourceNode, targetNode);

                    return (
                      <g key={edge.id}>
                        <path 
                          d={`M ${p1.x} ${p1.y} L ${p2.x} ${p2.y}`} 
                          stroke="#ec4899" 
                          strokeWidth="1.5" 
                          markerEnd="url(#arrowhead)" 
                        />
                        {/* Edge Label (if any) */}
                        {(edge.text || editingEdgeId === edge.id) && (
                          <foreignObject 
                            x={(p1.x + p2.x) / 2 - 30} 
                            y={(p1.y + p2.y) / 2 - 12} 
                            width="60" 
                            height="24" 
                            className="overflow-visible pointer-events-auto"
                          >
                            <div 
                              className="flex items-center justify-center w-full h-full"
                              onDoubleClick={(e) => { e.stopPropagation(); setEditingEdgeId(edge.id); }}
                            >
                              {editingEdgeId === edge.id ? (
                                <input 
                                  autoFocus
                                  className="text-xs px-1 text-center border-b border-blue-500 outline-none bg-white text-slate-800 shadow-sm w-full"
                                  value={edge.text || ''}
                                  onChange={(e) => updateEdgeText(edge.id, e.target.value)}
                                  onBlur={() => setEditingEdgeId(null)}
                                  onKeyDown={(e) => { if (e.key === 'Enter') setEditingEdgeId(null) }}
                                />
                              ) : (
                                <span className="text-[11px] px-1.5 py-0.5 bg-white border border-pink-200 rounded text-pink-700 font-medium cursor-text">
                                  {edge.text}
                               </span>
                              )}
                            </div>
                          </foreignObject>
                        )}
                      </g>
                    );
                  })}

                  {/* Temp Edge while connecting */}
                  {isConnecting && (
                    <path 
                      d={`M ${nodes.find(n => n.id === isConnecting.sourceId).x + nodes.find(n => n.id === isConnecting.sourceId).w / 2} ${nodes.find(n => n.id === isConnecting.sourceId).y + nodes.find(n => n.id === isConnecting.sourceId).h / 2} L ${tempMousePos.x} ${tempMousePos.y}`} 
                      stroke="#3b82f6" 
                      strokeWidth="2" 
                      strokeDasharray="4 4"
                      markerEnd="url(#arrowhead-connecting)" 
                    />
                  )}

                  {/* Bounding box selection drag UI */}
                  {isSelectingBox && (
                    <rect 
                      x={Math.min(isSelectingBox.startX, isSelectingBox.currentX)}
                      y={Math.min(isSelectingBox.startY, isSelectingBox.currentY)}
                      width={Math.abs(isSelectingBox.currentX - isSelectingBox.startX)}
                      height={Math.abs(isSelectingBox.currentY - isSelectingBox.startY)}
                      fill="rgba(59, 130, 246, 0.1)"
                      stroke="#3b82f6"
                      strokeWidth="1"
                      strokeDasharray="4 4"
                    />
                  )}
                </svg>

                {/* Nodes */}
                {nodes.map(node => {
                  const isSelected = selectedNodeIds.includes(node.id);
                  return (
                    <div 
                      key={node.id}
                      className="absolute group z-10"
                      style={{ 
                        left: node.x, 
                        top: node.y, 
                        width: node.w, 
                        height: node.h,
                      }}
                      onMouseDown={(e) => handleNodeMouseDown(e, node.id)}
                      onMouseUp={(e) => handleNodeMouseUp(e, node.id)}
                      onDoubleClick={(e) => { e.stopPropagation(); setEditingNodeId(node.id); }}
                    >
                      
                      {/* Process (Rectangle) Rendering */}
                      {node.type === 'process' && (
                        <div className={`w-full h-full bg-white shadow-sm flex items-center justify-center p-2 text-center text-sm break-words leading-tight transition-shadow
                          ${isSelected ? 'border-[2px] border-blue-500 shadow-blue-100' : 'border border-pink-500 hover:border-pink-600 hover:shadow-md'}`}>
                          {editingNodeId === node.id ? (
                            <textarea
                              autoFocus
                              className="w-full h-full outline-none resize-none text-center bg-transparent"
                              value={node.text}
                              onChange={(e) => updateNodeText(node.id, e.target.value)}
                              onBlur={() => setEditingNodeId(null)}
                            />
                          ) : (
                            <span className="pointer-events-none whitespace-pre-wrap">{node.text}</span>
                          )}
                        </div>
                      )}

                      {/* Decision (Diamond) Rendering */}
                      {node.type === 'decision' && (
                        <div className="w-full h-full relative">
                          <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none" viewBox="0 0 100 100">
                            <polygon 
                              points="50,0 100,50 50,100 0,50" 
                              fill="white" 
                              stroke={isSelected ? '#3b82f6' : '#ec4899'} 
                              strokeWidth={isSelected ? "4" : "2"} 
                              vectorEffect="non-scaling-stroke" 
                            />
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center px-6 py-4 text-center text-sm leading-tight">
                             {editingNodeId === node.id ? (
                              <textarea
                                autoFocus
                                className="w-full h-full outline-none resize-none text-center bg-transparent z-10 pt-[25%]"
                                value={node.text}
                                onChange={(e) => updateNodeText(node.id, e.target.value)}
                                onBlur={() => setEditingNodeId(null)}
                              />
                            ) : (
                              <span className="pointer-events-none whitespace-pre-wrap z-10">{node.text}</span>
                            )}
                          </div>
                        </div>
                      )}

                      {/* Connection Port Handles (Shows on hover or selection) */}
                      <div 
                        className={`absolute right-[-10px] top-1/2 -translate-y-1/2 w-5 h-5 bg-blue-500 rounded-full border-2 border-white shadow hover:scale-125 cursor-crosshair z-20 flex items-center justify-center text-white transition-all
                        ${isSelected ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}
                        onMouseDown={(e) => handleConnectionStart(e, node.id)}
                      >
                        <Icons.PlusCircle className="w-3 h-3" />
                      </div>
                    </div>
                  );
                })}

                {/* Selection Bounding Box Resize Overlay (For Requirement 3) */}
                {bb && selectedNodeIds.length > 1 && !draggingNodeInfo && (
                  <div 
                    className="absolute border border-blue-500 border-dashed pointer-events-none z-20"
                    style={{ left: bb.x - 5, top: bb.y - 5, width: bb.w + 10, height: bb.h + 10 }}
                  >
                    {/* Bounding box resize handle */}
                    <div 
                      className="absolute bottom-[-6px] right-[-6px] w-3 h-3 bg-white border-2 border-blue-500 pointer-events-auto cursor-se-resize rounded-sm hover:scale-125 transition-transform"
                      onMouseDown={(e) => {
                        e.stopPropagation();
                        const coords = getCanvasCoords(e);
                        setBbResizingInfo({
                          startX: coords.x,
                          startY: coords.y,
                          startBB: bb,
                          startNodes: nodes.filter(n => selectedNodeIds.includes(n.id)).map(n => ({ ...n }))
                        });
                      }}
                    />
                  </div>
                )}
                
              </div>
            </main>
          </div>
        </div>
      );
    }

    // Mount the application to the DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FlowNoteApp />);
  </script>
</body>
</html>
